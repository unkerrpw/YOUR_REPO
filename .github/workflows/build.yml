name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest
    container:
      image: barichello/godot-ci:4.2.2
      env:
        HOME: /root

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build APK
        run: |
          export HOME=/root
          chown -R root:root . && chmod -R 777 .
          yes | sdkmanager "build-tools;33.0.2" 2>/dev/null || true
          JAVA=$(dirname $(dirname $(readlink -f $(which java))))
          export JAVA_HOME=$JAVA
          F=/root/.config/godot/editor_settings-4.tres
          ( grep -v "java_sdk_path" "$F" ; printf 'export/android/java_sdk_path = "%s"\n' "$JAVA" ) > /tmp/s.tres
          cp /tmp/s.tres "$F" && chmod 444 "$F"
          mkdir -p .godot/editor .godot/imported && chmod -R 777 .godot
          HOME=/root JAVA_HOME=$JAVA godot --headless --editor --quit 2>/dev/null || true
          sleep 2
          chmod -R 777 .godot && chmod 444 "$F"
          sed -i 's|keystore/debug=""|keystore/debug="/root/debug.keystore"|' export_presets.cfg || true
          mkdir -p build
          HOME=/root JAVA_HOME=$JAVA godot --headless --export-debug "Android" $GITHUB_WORKSPACE/build/BallBlast.apk
          ls -la build/

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: BallBlast-APK
          path: build/BallBlast.apk
          retention-days: 30
