name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest
    container:
      image: barichello/godot-ci:4.2.2
      env:
        HOME: /root

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build APK
        run: |
          export HOME=/root
          chown -R root:root . && chmod -R 777 .
          yes | sdkmanager "build-tools;33.0.2" 2>/dev/null || true
          JAVA=$(dirname $(dirname $(readlink -f $(which java))))
          F=/root/.config/godot/editor_settings-4.tres
          ( grep -v "java_sdk_path" "$F" ; printf 'export/android/java_sdk_path = "%s"\n' "$JAVA" ) > /tmp/s.tres
          cp /tmp/s.tres "$F" && chmod 444 "$F"
          rm -rf /root/.local/share/godot/export_templates
          mkdir -p /root/.local/share/godot/export_templates
          ln -sf /root/.local/share/godot/export_templates/4.2.2.stable /root/.local/share/godot/export_templates/4.2.2.stable 2>/dev/null || true
          ls /root/.local/share/godot/export_templates/4.2.2.stable/ | grep android
          mkdir -p .godot/editor .godot/imported && chmod -R 777 .godot
          mkdir -p build
          HOME=/root JAVA_HOME=$JAVA godot --headless --editor --export-debug "Android" $GITHUB_WORKSPACE/build/BallBlast.apk 2>&1 | grep -v "not exposed" | grep -v "skipping"
          ls -la build/

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: BallBlast-APK
          path: build/BallBlast.apk
          retention-days: 30
