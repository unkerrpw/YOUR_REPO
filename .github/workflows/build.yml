name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest
    container:
      image: barichello/godot-ci:4.2.2

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup and build
        run: |
          JAVA=$(dirname $(dirname $(readlink -f $(which java))))
          echo "HOME=$HOME JAVA=$JAVA ANDROID_HOME=$ANDROID_HOME"
          mkdir -p ~/.local/share/godot/export_templates
          mv /root/.local/share/godot/export_templates/4.2.2.stable ~/.local/share/godot/export_templates/4.2.2.stable
          yes | sdkmanager "build-tools;33.0.2" 2>/dev/null || true
          chown -R root:root . && chmod -R 777 .
          mkdir -p .godot/editor .godot/imported && chmod -R 777 .godot
          JAVA_HOME=$JAVA godot --headless --import 2>&1 | tail -3 || true
          chmod -R 777 .godot
          F=~/.config/godot/editor_settings-4.tres
          if [ -f "$F" ]; then
            echo "Settings created by import, patching..."
            ( grep -v java_sdk_path "$F" ; printf 'export/android/java_sdk_path = "%s"\n' "$JAVA" ) > /tmp/s.tres
            cp /tmp/s.tres "$F"
            grep android "$F" | grep -i java
          else
            echo "No settings file created by import!"
          fi
          mkdir -p build
          JAVA_HOME=$JAVA godot --headless --verbose --export-debug "Android" $GITHUB_WORKSPACE/build/BallBlast.apk 2>&1 | grep -vE "not exposed|skipping"
          ls -la build/

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: BallBlast-APK
          path: build/BallBlast.apk
          retention-days: 30
