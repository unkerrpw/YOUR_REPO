name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest
    container:
      image: barichello/godot-ci:4.2.2

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Fix ownership
        run: chown -R root:root .

      - name: Setup export templates
        run: |
          mkdir -p ~/.local/share/godot/export_templates/4.2.2.stable
          cp -r /root/.local/share/godot/export_templates/4.2.2.stable/* ~/.local/share/godot/export_templates/4.2.2.stable/ 2>/dev/null || true

      - name: Install build-tools 34
        run: yes | sdkmanager "build-tools;34.0.0" 2>/dev/null || true

      - name: Find Java and write editor settings
        run: |
          JAVA=$(dirname $(dirname $(readlink -f $(which java))))
          echo "Java: $JAVA"
          mkdir -p /root/.config/godot
          S=/root/.config/godot/editor_settings-4.tres
          echo '[gd_resource type="EditorSettings" format=3]' > $S
          echo '' >> $S
          echo '[resource]' >> $S
          echo 'export/android/android_sdk_path = "/usr/lib/android-sdk"' >> $S
          echo 'export/android/debug_keystore = "/root/debug.keystore"' >> $S
          echo 'export/android/debug_keystore_user = "androiddebugkey"' >> $S
          echo 'export/android/debug_keystore_pass = "android"' >> $S
          echo "export/android/java_sdk_path = \"$JAVA\"" >> $S
          cat $S

      - name: Prepare .godot and import
        run: |
          mkdir -p .godot/editor .godot/imported
          chmod -R 777 .godot
          godot --headless --import || true
          sleep 2

      - name: Build APK
        run: |
          mkdir -p build
          JAVA=$(dirname $(dirname $(readlink -f $(which java))))
          export JAVA_HOME=$JAVA
          godot --headless --path $GITHUB_WORKSPACE --export-debug "Android" $GITHUB_WORKSPACE/build/BallBlast.apk
          ls -la build/

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: BallBlast-APK
          path: build/BallBlast.apk
          retention-days: 30
