name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest
    container:
      image: barichello/godot-ci:4.2.2

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Fix ownership
        run: chown -R root:root .

      - name: Setup export templates
        run: |
          mkdir -p ~/.local/share/godot/export_templates/4.2.2.stable
          cp -r /root/.local/share/godot/export_templates/4.2.2.stable/* ~/.local/share/godot/export_templates/4.2.2.stable/ 2>/dev/null || true

      - name: Install build-tools 34
        run: yes | sdkmanager "build-tools;34.0.0" 2>/dev/null || true

      - name: Patch editor settings java path
        run: |
          JAVA=$(dirname $(dirname $(readlink -f $(which java))))
          S=/root/.config/godot/editor_settings-4.tres
          sed -i "/java_sdk_path/d" $S 2>/dev/null || true
          echo "export/android/java_sdk_path = \"$JAVA\"" >> $S

      - name: Build APK
        run: |
          mkdir -p build
          JAVA=$(dirname $(dirname $(readlink -f $(which java))))
          export JAVA_HOME=$JAVA
          godot --headless --verbose --export-debug "Android" /root/BallBlast.apk 2>&1 | tail -30
          echo "=== Find APK ==="
          find / -name "*.apk" 2>/dev/null || true

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: BallBlast-APK
          path: /root/BallBlast.apk
          retention-days: 30
