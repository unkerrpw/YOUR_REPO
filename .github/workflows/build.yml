name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install build-tools
        run: yes | sdkmanager "build-tools;34.0.0" "platforms;android-34" 2>/dev/null

      - name: Download Godot 4.2.2
        run: |
          wget -q https://github.com/godotengine/godot/releases/download/4.2.2-stable/Godot_v4.2.2-stable_linux.x86_64.zip
          unzip -q Godot_v4.2.2-stable_linux.x86_64.zip
          chmod +x Godot_v4.2.2-stable_linux.x86_64
          sudo mv Godot_v4.2.2-stable_linux.x86_64 /usr/local/bin/godot

      - name: Download export templates
        run: |
          mkdir -p ~/.local/share/godot/export_templates/4.2.2.stable
          wget -q https://github.com/godotengine/godot/releases/download/4.2.2-stable/Godot_v4.2.2-stable_export_templates.tpz
          unzip -q Godot_v4.2.2-stable_export_templates.tpz
          mv templates/* ~/.local/share/godot/export_templates/4.2.2.stable/

      - name: Generate keystore
        run: |
          keytool -genkey -v -keystore debug.keystore -alias androiddebugkey -keyalg RSA -keysize 2048 -validity 10000 -storepass android -keypass android -dname "CN=Android Debug,O=Android,C=US"

      - name: Write editor settings
        run: |
          mkdir -p ~/.config/godot
          SDK=$(dirname $(dirname $(which sdkmanager)))
          JAVA=$(dirname $(dirname $(readlink -f $(which java))))
          KS="$GITHUB_WORKSPACE/debug.keystore"
          F=~/.config/godot/editor_settings-4.tres
          echo "[gd_resource type="EditorSettings" format=3]" > $F
          echo "" >> $F
          echo "[resource]" >> $F
          echo "export/android/android_sdk_path = "$SDK"" >> $F
          echo "export/android/debug_keystore = "$KS"" >> $F
          echo "export/android/debug_keystore_user = "androiddebugkey"" >> $F
          echo "export/android/debug_keystore_pass = "android"" >> $F
          echo "export/android/java_sdk_path = "$JAVA"" >> $F
          cat $F
          sed -i "s|keystore/debug=\"[^\"]*\"|keystore/debug=\"$KS\"|" export_presets.cfg

      - name: Prepare .godot dir
        run: |
          sudo mkdir -p .godot/editor .godot/imported
          sudo chmod -R 777 .godot
          sudo chown -R $USER:$USER .godot

      - name: Build APK
        run: |
          mkdir -p build
          godot --headless --export-debug "Android" $GITHUB_WORKSPACE/build/BallBlast.apk
          ls -la build/

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: BallBlast-APK
          path: build/BallBlast.apk
          retention-days: 30
