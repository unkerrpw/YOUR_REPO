name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android build tools
        run: sdkmanager "build-tools;34.0.0" "platforms;android-34" "ndk;25.2.9519653"

      - name: Download Godot 4.2.2
        run: |
          wget -q https://github.com/godotengine/godot/releases/download/4.2.2-stable/Godot_v4.2.2-stable_linux.x86_64.zip
          unzip -q Godot_v4.2.2-stable_linux.x86_64.zip
          chmod +x Godot_v4.2.2-stable_linux.x86_64
          sudo mv Godot_v4.2.2-stable_linux.x86_64 /usr/local/bin/godot

      - name: Download export templates
        run: |
          mkdir -p ~/.local/share/godot/export_templates/4.2.2.stable
          wget -q https://github.com/godotengine/godot/releases/download/4.2.2-stable/Godot_v4.2.2-stable_export_templates.tpz
          unzip -q Godot_v4.2.2-stable_export_templates.tpz
          mv templates/* ~/.local/share/godot/export_templates/4.2.2.stable/

      - name: Generate debug keystore
        run: |
          keytool -genkey -v -keystore debug.keystore -alias androiddebugkey -keyalg RSA -keysize 2048 -validity 10000 -storepass android -keypass android -dname "CN=Android Debug,O=Android,C=US"

      - name: Patch export_presets with keystore
        run: |
          KS="$GITHUB_WORKSPACE/debug.keystore"
          sed -i "s|keystore/debug=\"\"|keystore/debug=\"$KS\"|" export_presets.cfg
          grep keystore export_presets.cfg

      - name: Create editor settings
        run: |
          mkdir -p ~/.config/godot
          SETTINGS=~/.config/godot/editor_settings-4.tres
          KS="$GITHUB_WORKSPACE/debug.keystore"
          SDK="/usr/local/lib/android/sdk"
          printf '[gd_resource type="EditorSettings" format=3]\n[resource]\n' > $SETTINGS
          printf 'export/android/android_sdk_path = "%s"\n' "$SDK" >> $SETTINGS
          printf 'export/android/debug_keystore = "%s"\n' "$KS" >> $SETTINGS
          printf 'export/android/debug_keystore_user = "androiddebugkey"\n' >> $SETTINGS
          printf 'export/android/debug_keystore_pass = "android"\n' >> $SETTINGS

      - name: Import project
        run: |
          godot --headless --editor --quit 2>/dev/null || true
          sleep 5

      - name: Build APK
        run: |
          mkdir -p build
          godot --headless --export-debug "Android" "$GITHUB_WORKSPACE/build/BallBlast.apk"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: BallBlast-APK
          path: build/BallBlast.apk
          retention-days: 30
