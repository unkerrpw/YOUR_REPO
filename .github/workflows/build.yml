name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest
    container:
      image: barichello/godot-ci:4.2.2

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup templates
        run: |
          mkdir -p ~/.local/share/godot/export_templates
          mv /root/.local/share/godot/export_templates/4.2.2.stable ~/.local/share/godot/export_templates/4.2.2.stable
          yes | sdkmanager "build-tools;33.0.2" 2>/dev/null || true
          chown -R root:root . && chmod -R 777 .
          mkdir -p .godot/editor .godot/imported && chmod -R 777 .godot

      - name: Import project
        run: |
          JAVA=$(dirname $(dirname $(readlink -f $(which java))))
          JAVA_HOME=$JAVA godot --headless --import 2>&1 | tail -5 || true
          chmod -R 777 .godot

      - name: Export APK
        run: |
          mkdir -p build
          JAVA=$(dirname $(dirname $(readlink -f $(which java))))
          JAVA_HOME=$JAVA godot --headless --export-debug "Android" $GITHUB_WORKSPACE/build/BallBlast.apk
          ls -la build/

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: BallBlast-APK
          path: build/BallBlast.apk
          retention-days: 30
