name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest
    container:
      image: barichello/godot-ci:4.2.2

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup and build
        run: |
          JAVA=$(dirname $(dirname $(readlink -f $(which java))))
          mkdir -p ~/.local/share/godot/export_templates
          mv /root/.local/share/godot/export_templates/4.2.2.stable ~/.local/share/godot/export_templates/4.2.2.stable
          yes | sdkmanager "build-tools;33.0.2" 2>/dev/null || true
          chown -R root:root . && chmod -R 777 .
          mkdir -p .godot/editor .godot/imported && chmod -R 777 .godot
          mkdir -p ~/.config/godot
          cp /root/.config/godot/editor_settings-4.tres ~/.config/godot/editor_settings-4.tres
          ( grep -v java_sdk_path ~/.config/godot/editor_settings-4.tres ; printf 'export/android/java_sdk_path = "%s"\n' "$JAVA" ) > /tmp/s.tres
          cp /tmp/s.tres ~/.config/godot/editor_settings-4.tres
          echo "Settings at: $(ls -la ~/.config/godot/editor_settings-4.tres)"
          JAVA_HOME=$JAVA godot --headless --editor --quit 2>&1 | grep -v "not exposed" | grep -v "skipping" | tail -10 || true
          echo "=== .godot/imported files ===" && ls .godot/imported/ | head -5 || echo "EMPTY"
          chmod -R 777 .godot
          cp /tmp/s.tres ~/.config/godot/editor_settings-4.tres
          mkdir -p build
          JAVA_HOME=$JAVA godot --headless --export-debug "Android" /tmp/BallBlast.apk 2>&1 | grep -vE "not exposed|skipping|Class.*Editor"
          echo "=== APK check ===" && ls -la /tmp/BallBlast.apk 2>/dev/null || echo "No APK at /tmp"
          cp /tmp/BallBlast.apk build/BallBlast.apk 2>/dev/null || true
          ls -la build/

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: BallBlast-APK
          path: build/BallBlast.apk
          retention-days: 30
