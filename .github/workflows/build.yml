name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install build-tools 33
        run: yes | sdkmanager "build-tools;33.0.2" "platforms;android-33" 2>/dev/null

      - name: Download Godot 4.2.2
        run: |
          wget -q https://github.com/godotengine/godot/releases/download/4.2.2-stable/Godot_v4.2.2-stable_linux.x86_64.zip
          unzip -q Godot_v4.2.2-stable_linux.x86_64.zip
          chmod +x Godot_v4.2.2-stable_linux.x86_64
          sudo mv Godot_v4.2.2-stable_linux.x86_64 /usr/local/bin/godot

      - name: Download export templates
        run: |
          mkdir -p $HOME/.local/share/godot/export_templates/4.2.2.stable
          wget -q https://github.com/godotengine/godot/releases/download/4.2.2-stable/Godot_v4.2.2-stable_export_templates.tpz
          unzip -q Godot_v4.2.2-stable_export_templates.tpz
          mv templates/* $HOME/.local/share/godot/export_templates/4.2.2.stable/
          echo "=== Templates ==="
          ls $HOME/.local/share/godot/export_templates/4.2.2.stable/ | grep android

      - name: Generate keystore
        run: |
          keytool -genkey -v             -keystore $GITHUB_WORKSPACE/debug.keystore             -alias androiddebugkey             -keyalg RSA -keysize 2048 -validity 10000             -storepass android -keypass android             -dname "CN=Android Debug,O=Android,C=US"

      - name: Create .godot dir and import
        run: |
          mkdir -p .godot/editor .godot/imported
          chmod -R 777 .godot
          godot --headless --editor --quit 2>&1 | grep -v "not exposed" | tail -20
          sleep 2
          echo "=== .godot contents ===" && ls -la .godot/editor/ || true

      - name: Patch editor settings
        run: |
          F="$HOME/.config/godot/editor_settings-4.tres"
          SDK=$(dirname $(dirname $(which sdkmanager)))
          JAVA=$(dirname $(dirname $(readlink -f $(which java))))
          KS="$GITHUB_WORKSPACE/debug.keystore"
          sed -i "/export\/android/d" "$F"
          printf "export/android/android_sdk_path = \"%s\"\n" "$SDK" >> "$F"
          printf "export/android/debug_keystore = \"%s\"\n" "$KS" >> "$F"
          printf "export/android/debug_keystore_user = \"androiddebugkey\"\n" >> "$F"
          printf "export/android/debug_keystore_pass = \"android\"\n" >> "$F"
          printf "export/android/java_sdk_path = \"%s\"\n" "$JAVA" >> "$F"
          echo "=== Android settings ===" && grep android "$F"
          sed -i "s|keystore/debug=\"[^\"]*\"|keystore/debug=\"$KS\"|" export_presets.cfg
          echo "=== Preset keystore ===" && grep "keystore/debug" export_presets.cfg

      - name: Build APK verbose
        run: |
          mkdir -p build
          echo "=== Templates check ==="
          ls $HOME/.local/share/godot/export_templates/4.2.2.stable/ | grep android
          echo "=== Starting export ==="
          godot --headless --verbose --export-debug "Android" $GITHUB_WORKSPACE/build/BallBlast.apk 2>&1 | grep -v "not exposed" | grep -v "is not exposed"
          echo "Exit: $?"
          ls -la build/ || true

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: BallBlast-APK
          path: build/BallBlast.apk
          retention-days: 30
