name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest
    container:
      image: barichello/godot-ci:4.2.2

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build APK
        run: |
          chown -R root:root . && chmod -R 777 .
          yes | sdkmanager "build-tools;33.0.2" 2>/dev/null || true
          JAVA=$(dirname $(dirname $(readlink -f $(which java))))
          mv /root/.config /github/home/.config
          mv /root/.local /github/home/.local
          echo "export/android/java_sdk_path = \"$JAVA\"" >> /github/home/.config/godot/editor_settings-4.tres
          tail -3 /github/home/.config/godot/editor_settings-4.tres
          mkdir -p .godot/editor .godot/imported && chmod -R 777 .godot
          mkdir -p build
          godot --headless --editor --export-debug "Android" $GITHUB_WORKSPACE/build/BallBlast.apk
          ls -la build/

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: BallBlast-APK
          path: build/BallBlast.apk
          retention-days: 30
