name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest
    container:
      image: barichello/godot-ci:4.2.2

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Fix ownership
        run: chown -R root:root . && chmod -R 777 .

      - name: Install build-tools 33
        run: yes | sdkmanager "build-tools;33.0.2" 2>/dev/null || true

      - name: Patch and build
        run: |
          export HOME=/root
          echo "HOME=$HOME USER=$(whoami)"
          JAVA=$(dirname $(dirname $(readlink -f $(which java))))
          echo "JAVA=$JAVA"
          F=/root/.config/godot/editor_settings-4.tres
          chmod 666 "$F"
          cp "$F" /tmp/gs_backup.tres
          grep -v "java_sdk_path" /tmp/gs_backup.tres > /tmp/gs_new.tres
          echo 'export/android/java_sdk_path = "'"$JAVA"'"' >> /tmp/gs_new.tres
          cp /tmp/gs_new.tres "$F"
          echo "=== Last 5 lines of settings ===" && tail -5 "$F"
          mkdir -p .godot/editor .godot/imported
          chmod -R 777 .godot
          mkdir -p build
          godot --headless --export-debug "Android" $GITHUB_WORKSPACE/build/BallBlast.apk
          ls -la build/

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: BallBlast-APK
          path: build/BallBlast.apk
          retention-days: 30
