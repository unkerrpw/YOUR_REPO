name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest
    container:
      image: barichello/godot-ci:4.2.2

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Fix ownership and permissions
        run: |
          chown -R root:root .
          chmod -R 777 .
          mkdir -p .godot/editor .godot/imported
          echo "Workspace: $GITHUB_WORKSPACE"

      - name: Setup export templates
        run: |
          mkdir -p $HOME/.local/share/godot/export_templates/4.2.2.stable
          cp -r /root/.local/share/godot/export_templates/4.2.2.stable/* $HOME/.local/share/godot/export_templates/4.2.2.stable/ 2>/dev/null || true

      - name: Install build-tools 34
        run: yes | sdkmanager "build-tools;34.0.0" 2>/dev/null || true

      - name: Copy keystore and write editor settings
        run: |
          JAVA=$(dirname $(dirname $(readlink -f $(which java))))
          cp /root/debug.keystore $HOME/debug.keystore 2>/dev/null || cp /root/debug.keystore . 2>/dev/null || true
          KS=$(find / -name "debug.keystore" 2>/dev/null | head -1)
          echo "Keystore: $KS, Java: $JAVA, Home: $HOME"
          mkdir -p $HOME/.config/godot
          S=$HOME/.config/godot/editor_settings-4.tres
          echo '[gd_resource type="EditorSettings" format=3]' > $S
          echo '' >> $S
          echo '[resource]' >> $S
          echo 'export/android/android_sdk_path = "/usr/lib/android-sdk"' >> $S
          echo "export/android/debug_keystore = \"$KS\"" >> $S
          echo 'export/android/debug_keystore_user = "androiddebugkey"' >> $S
          echo 'export/android/debug_keystore_pass = "android"' >> $S
          echo "export/android/java_sdk_path = \"$JAVA\"" >> $S
          cat $S
          sed -i "s|keystore/debug=\"[^\"]*\"|keystore/debug=\"$KS\"|" export_presets.cfg
          grep keystore export_presets.cfg

      - name: Build APK
        run: |
          JAVA=$(dirname $(dirname $(readlink -f $(which java))))
          export JAVA_HOME=$JAVA
          OUT=$GITHUB_WORKSPACE/BallBlast.apk
          godot --headless --verbose --export-debug "Android" $OUT 2>&1
          echo "Exit code: $?"
          echo "=== APK search ==="
          find / -name "BallBlast.apk" 2>/dev/null || true
          find / -name "*.apk" -newer /root/debug.keystore 2>/dev/null || true
          ls -la $GITHUB_WORKSPACE/

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: BallBlast-APK
          path: "*.apk"
          retention-days: 30
