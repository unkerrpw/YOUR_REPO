name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest
    container:
      image: barichello/godot-ci:4.2.2

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup export templates
        run: |
          mkdir -p ~/.local/share/godot/export_templates/4.2.2.stable
          cp -r /root/.local/share/godot/export_templates/4.2.2.stable/* ~/.local/share/godot/export_templates/4.2.2.stable/ 2>/dev/null || true

      - name: Setup environment and build
        run: |
          chmod -R 777 .
          mkdir -p .godot

          JAVA_HOME_DETECTED=$(dirname $(dirname $(readlink -f $(which java))))
          echo "Java: $JAVA_HOME_DETECTED"

          BUILD_TOOLS_VER=$(ls /usr/lib/android-sdk/build-tools/ | sort -V | tail -1)
          echo "Build tools: $BUILD_TOOLS_VER"

          mkdir -p /root/.config/godot
          printf '[gd_resource type="EditorSettings" format=3]\n\n[resource]\n' > /root/.config/godot/editor_settings-4.tres
          printf 'export/android/android_sdk_path = "/usr/lib/android-sdk"\n' >> /root/.config/godot/editor_settings-4.tres
          printf 'export/android/debug_keystore = "/root/debug.keystore"\n' >> /root/.config/godot/editor_settings-4.tres
          printf 'export/android/debug_keystore_user = "androiddebugkey"\n' >> /root/.config/godot/editor_settings-4.tres
          printf 'export/android/debug_keystore_pass = "android"\n' >> /root/.config/godot/editor_settings-4.tres
          printf "export/android/java_sdk_path = \"$JAVA_HOME_DETECTED\"\n" >> /root/.config/godot/editor_settings-4.tres
          cat /root/.config/godot/editor_settings-4.tres

          sed -i 's|keystore/debug=""|keystore/debug="/root/debug.keystore"|' export_presets.cfg
          sed -i 's|keystore/debug_user=""|keystore/debug_user="androiddebugkey"|' export_presets.cfg
          sed -i 's|keystore/debug_password=""|keystore/debug_password="android"|' export_presets.cfg
          grep keystore export_presets.cfg

          godot --headless --editor --quit || true
          sleep 3

          mkdir -p build
          godot --headless --export-debug "Android" build/BallBlast.apk

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: BallBlast-APK
          path: build/BallBlast.apk
          retention-days: 30
