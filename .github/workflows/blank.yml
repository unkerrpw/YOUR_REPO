name: Build Godot Android APK (Debug)

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v3

    - name: Download Godot Headless
      run: |
        wget https://downloads.tuxfamily.org/godotengine/4.2.3/Android/Godot_v4.2.3-stable_linux_headless.64.zip
        unzip Godot_v4.2.3-stable_linux_headless.64.zip -d godot
        chmod +x godot/Godot_v4.2.3-stable_linux_headless.64

    - name: Build Debug APK
      run: |
        mkdir -p build
        # Собираем APK с профилем Android (debug)
        ./godot/Godot_v4.2.3-stable_linux_headless.64 --export "Android" build/mygame-debug.apk

    - name: Upload APK artifact
      uses: actions/upload-artifact@v3
      with:
        name: mygame-apk
        path: build/mygame-debug.apk
